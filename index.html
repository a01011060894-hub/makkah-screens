<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكة شاشات COB - التميز الداخلي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* تخصيص للخلفية الكحلية الداكنة */
        body {
            background-color: #0d122b; /* كحلي داكن فاخر */
            color: #ffffff; /* نص أبيض لسهولة القراءة */
        }
        /* تصميم البطاقة ليتناسب مع الصورة المصقولة */
        .cob-card {
            background-color: #1a1e3f; /* خلفية أفتح قليلاً للبطاقة */
            border: 1px solid rgba(251, 191, 36, 0.2); /* إطار ذهبي-برتقالي خفيف جداً */
            border-radius: 12px; /* حواف ناعمة */
            overflow: hidden; /* لضمان قص الصورة بشكل نظيف عند الحواف */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* ظل عميق للشعور بالفخامة */
        }
        /* ضمان تجاوب الصورة بشكل مثالي */
        .cob-img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container mt-5 mb-5 d-flex justify-content-center">
        <div class="card cob-card" style="max-width: 900px;">
            <img src="image_0.png" class="cob-img card-img-top" alt="شاشة مكة COB - تميز معماري">
            
            <div class="card-body p-4 text-center">
                <h5 class="card-title" style="color: #fbbf24;">جمعية الجوار - مكة المكرمة</h5>
                <p class="card-text text-muted">التميز الداخلي يبدأ من هنا. حلول عرض COB المتقدمة.</p>
                <a href="#" class="btn btn-warning" style="background-color: #fbbf24; border-color: #fbbf24;">تواصل معنا</a>
            </div>
        </div>
    </div>

</body>
</html>
